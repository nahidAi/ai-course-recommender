<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>AI Course Recommender</title>

<style>
body{
  font-family:sans-serif;
  direction:rtl;
  padding:40px;
  background:#f5f5f5;
}
textarea{
  width:100%;
  height:100px;
  margin-top:10px;
}
button{
  margin-top:10px;
  padding:10px 20px;
  cursor:pointer;
}
#result{
  margin-top:20px;
  padding:15px;
  background:white;
  border-radius:8px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>پیشنهاد هوشمند دوره نجوم</h2>

<label>هدفت از یادگیری چیه؟</label>
<textarea id="userInput" placeholder="مثلاً می‌خوام درباره سیاه‌چاله‌ها بیشتر بدونم..."></textarea>

<button id="recommendBtn">پیشنهاد بده</button>

<div id="result"></div>

<script>

// اتصال دکمه به تابع — تضمینی
document.getElementById("recommendBtn").addEventListener("click", recommendCourse);

async function recommendCourse(){

  const userText = document.getElementById("userInput").value.trim();
  const resultDiv = document.getElementById("result");

  if(!userText){
    resultDiv.innerText = "لطفاً هدفت رو بنویس 🌌";
    return;
  }

  resultDiv.innerText = "در حال تحلیل درخواست شما...";

  // پرامپت امن بدون template literal
  const prompt =
"شما یک مشاور حرفه‌ای مسیر یادگیری نجوم هستید.\n"+
"\n"+
"از بین دوره‌های زیر بهترین گزینه را انتخاب کن.\n"+
"\n"+
"دوره‌ها:\n"+
"1. کیهان‌شناسی و دینامیک کهکشان جامع پیشرفته (پیشرفته)\n"+
"2. اخترفیزیک جامع (متوسط)\n"+
"3. حساب دیفرانسیل و انتگرال (پایه)\n"+
"4. مکانیک سماوی (پیشرفته)\n"+
"5. نجوم رصدی (مبتدی)\n"+
"\n"+
"هدف کاربر:\n"+
userText+
"\n\n"+
"فقط در قالب JSON پاسخ بده:\n"+
"{\n"+
"  \"main_course\": \"نام دوره\",\n"+
"  \"level\": \"سطح دوره\",\n"+
"  \"reason\": \"دلیل پیشنهاد\",\n"+
"  \"secondary_course\": \"یا null\"\n"+
"}";

  try {
    const request = await fetch("/api/recommend", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: prompt })
    });

    const data = await request.json().catch(()=>null);

    if(!data){
      resultDiv.innerText = "پاسخ سرور JSON معتبر نبود.";
      return;
    }

    if(!request.ok || data.error){
      resultDiv.innerText = "خطای سرور:\n" + JSON.stringify(data,null,2);
      return;
    }

    const main = data.main_course || "نامشخص";
    const level = data.level || "نامشخص";
    const reason = data.reason || "بدون توضیح";
    const secondary = data.secondary_course;

    let output = 
      "✅ پیشنهاد اصلی:\n" + main +
      "\n\nسطح: " + level +
      "\nدلیل: " + reason;

    if(secondary && secondary !== "null"){
      output += "\n\nدوره مکمل: " + secondary;
    }

    resultDiv.innerText = output;

  } catch (err){
    resultDiv.innerText = "خطای شبکه:\n" + err.message;
  }
}

</script>
</body>
</html>
