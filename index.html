<!DOCTYPE html>
<html>
<head>
  <title>AI Course Recommender</title>
</head>
<body>

<h1>Ask for Recommendation</h1>

<input id="query" placeholder="What do you want to learn?" />
  <select id="level">
  <option value="beginner">Beginner</option>
  <option value="intermediate">Intermediate</option>
  <option value="advanced">Advanced</option>
</select>

<button onclick="askRecommendation()">Send</button>

<p id="result"></p>

<script>
async function askRecommendation() {

  const query = document.getElementById("query").value;
  const level = document.getElementById("level").value;


  const res = await fetch("/api/recommend", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
   body: JSON.stringify({
  question: question,
  level: level
})

  });

  const data = await res.json();

  document.getElementById("result").innerText = data.recommendation;

}
</script>

</body>
</html>
