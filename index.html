<script>
  document.getElementById("gen").addEventListener("click", async () => {

    const prompt = document.getElementById("txt").value;
    const box = document.getElementById("res");
    box.textContent = "در حال پردازش...";

    try {
      const res = await fetch("/api/recommend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: prompt }),
      });

      const data = await res.json();

      if (!res.ok) {
        box.textContent = "خطا: " + JSON.stringify(data, null, 2);
        return;
      }

      box.textContent =
        "Course: " + data.main_course + "\n" +
        "Level: " + data.level + "\n" +
        "Reason: " + data.reason + "\n" +
        "Secondary: " + data.secondary_course;
    } catch (e) {
      box.textContent = "خطای شبکه: " + e.message;
    }

  });
</script>
