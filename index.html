<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <title>AI Course Recommender</title>
  <style>
    body {
      font-family: sans-serif;
      direction: rtl;
      padding: 40px;
      background-color: #f5f5f5;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h2>پیشنهاد هوشمند دوره نجوم</h2>

  <label>هدفت از یادگیری چیه؟</label>
  <textarea id="userInput" placeholder="مثلاً می‌خوام درباره سیاه‌چاله‌ها بیشتر بدونم..."></textarea>

  <button onclick="recommendCourse()">پیشنهاد بده</button>

  <div id="result"></div>

 <script>
async function recommendCourse() {

  const userText = document.getElementById("userInput").value;
  const resultDiv = document.getElementById("result");

  if (userText.trim() === "") {
    resultDiv.innerHTML = "لطفاً هدفت رو بنویس 🌌";
    return;
  }

  resultDiv.innerHTML = "در حال تحلیل درخواست شما...";

  const prompt = `
شما یک مشاور حرفه‌ای مسیر یادگیری نجوم هستید.

از بین دوره‌های زیر، بهترین گزینه را انتخاب کن.

دوره‌ها:
1. کیهان‌شناسی و دینامیک کهکشان جامع پیشرفته (پیشرفته)
2. اخترفیزیک جامع (متوسط)
3. حساب دیفرانسیل و انتگرال (پایه)
4. مکانیک سماوی (پیشرفته)
5. نجوم رصدی (مبتدی)

هدف کاربر:
${userText}

فقط و فقط در قالب JSON پاسخ بده.
هیچ توضیح اضافه‌ای خارج از JSON ننویس.

فرمت خروجی دقیقاً این باشد:

{
  "main_course": "نام دوره",
  "level": "سطح دوره",
  "reason": "دلیل پیشنهاد",
  "secondary_course": "در صورت نیاز یک دوره مکمل، در غیر این صورت null"
}
`;


  const response = await fetch("https://api.openai.com/v1/chat/completions", {

    method: "POST",

    headers: {
      "Content-Type": "application/json",
     "Authorization": "Bearer YOUR_API_KEY_HERE"

    },

    body: JSON.stringify({
      model: "gpt-4o",

      messages: [
        { role: "user", content: prompt }
      ]
    })

  });

  const data = await response.json();
const aiReply = data.choices[0].message.content;

let parsed;

try {
  parsed = JSON.parse(aiReply);
} catch (error) {
  resultDiv.innerHTML = "خطا در پردازش پاسخ AI";
  return;
}

resultDiv.innerHTML = `
  <h3>✅ پیشنهاد اصلی:</h3>
  <strong>${parsed.main_course}</strong>
  <p><b>سطح:</b> ${parsed.level}</p>
  <p><b>دلیل:</b> ${parsed.reason}</p>
  ${
    parsed.secondary_course && parsed.secondary_course !== "null"
      ? `<p><b>دوره مکمل:</b> ${parsed.secondary_course}</p>`
      : ""
  }
`;


}
</script>


</body>
</html>
