<div>
  <textarea id="txt" rows="6" style="width: 100%;"></textarea>
  <button id="gen">Generate</button>
</div>

<pre id="res"></pre>

<script>
  // اینجا مطمئن می‌شویم وقتی DOM آماده شد اجرا شود
  document.addEventListener("DOMContentLoaded", () => {

    const btn = document.getElementById("gen");
    const txt = document.getElementById("txt");
    const res = document.getElementById("res");

    btn.addEventListener("click", async () => {

      res.textContent = "در حال پردازش...";

      const message = txt.value;

      try {
        const r = await fetch("/api/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await r.json();

        if (!r.ok) {
          res.textContent = "خطا:\n" + JSON.stringify(data, null, 2);
          return;
        }

       res.textContent = JSON.stringify(data, null, 2);


      } catch (err) {
        res.textContent = "Network Error: " + err.message;
      }

    });

  });
</script>
